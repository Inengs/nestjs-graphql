services:
  nestjs:
    build: .
    ports:
      - 3000:3000
      - 9464:9464
    networks:
      - my-network

  prometheus:
    image: prom/prometheus
    ports:
      - 9090:9090
    networks:
      - my-network
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - 3001:3000
    networks:
      - my-network

  jaeger:
    image: jaegertracing/all-in-one
    ports:
      - 16686:16686
    networks:
      - my-network

  loki:
    image: grafana/loki
    ports:
      - 3100:3100
    networks:
      - my-network

  openTelemetry-collector:
    image: otel/opentelemetry-collector
    ports:
      - 4317:4317
    networks:
      - my-network

networks:
  my-network:
